<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>USM — Mozilla Firefox</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            font-size: 12px;
            background-color: #ffffff;
            color: #000000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .login-container {
            width: 850px;
            text-align: center;
            margin-top: -50px;
        }

        .usm-header {
            margin-bottom: 40px;
        }
        .usm-logo {
            width: 75px;
            height: auto;
            vertical-align: middle;
            margin-right: 15px;
        }
        .usm-title {
            font-size: 20px;
            font-weight: bold;
            color: #000000;
            display: inline-block;
            vertical-align: middle;
            margin: 0;
        }
        .usm-subtitle {
            font-size: 13px;
            font-weight: bold;
            margin-top: 8px;
            margin-left: 85px;
            color: #000000;
            text-align: left;
        }

        .login-content {
            display: flex;
            justify-content: flex-start;
            align-items: flex-start;
            gap: 20px;
            padding-left: 110px;
        }

        .auth-form {
            width: 260px;
            text-align: left;
            margin-top: 15px;
        }
        .auth-title {
            font-size: 14px;
            font-weight: bold;
            margin-bottom: 15px;
            text-align: center;
            width: 100%;
        }
        .input-label {
            font-size: 11px;
            margin-bottom: 3px;
            display: block;
        }
        .input-field {
            width: 100%;
            padding: 3px 5px;
            border: 1px solid #7a7a7a;
            font-size: 12px;
            margin-bottom: 15px;
        }
        .login-btn {
            background-color: #f0f0f0;
            border: 1px solid #7a7a7a;
            padding: 4px 20px;
            font-size: 12px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: inset 0 1px 0 #fff;
            margin-bottom: 20px;
        }
        .login-btn:hover {
            background-color: #e5e5e5;
        }

        .recaptcha-box {
            display: flex;
            align-items: center;
            border: 1px solid #d3d3d3;
            background-color: #f9f9f9;
            padding: 10px;
            width: 200px;
            border-radius: 3px;
        }
        .recaptcha-checkbox {
            width: 24px;
            height: 24px;
            margin-right: 10px;
            cursor: pointer;
        }
        .recaptcha-text {
            font-size: 13px;
            font-family: Roboto, Arial, sans-serif;
            color: #000000;
            flex-grow: 1;
        }
        .recaptcha-logo {
            width: 26px;
            height: 26px;
            background: url('https://www.gstatic.com/recaptcha/api2/logo_48.png') no-repeat;
            background-size: contain;
        }

        .showcase-image {
            width: 410px;
            height: auto;
            border: 1px solid #cccccc;
            box-shadow: 2px 2px 5px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="login-container">
    
    <div class="usm-header">
        <img class="usm-logo" src="usm-logo.png" alt="USM Logo" onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 100 100\' width=\'100\' height=\'100\'><circle cx=\'50\' cy=\'50\' r=\'45\' fill=\'%23006633\'/><path d=\'M30 70 L50 30 L70 70 Z\' fill=\'%23fff\'/></svg>'">
        <h1 class="usm-title">Universitatea de Stat din Moldova</h1>
        <div class="usm-subtitle">Situatia academica</div>
    </div>

    <div class="login-content">
        
        <div class="auth-form">
            <div class="auth-title">Authorization</div>
            
            <form action="home.html" method="get">
                <label class="input-label" for="cod-personal">Introduceti Cod Personal</label>
                <input class="input-field" type="password" id="cod-personal" name="cod" required autocomplete="off">
                
                <button class="login-btn" type="submit">Login</button>
            </form>

            <div class="recaptcha-box">
                <input type="checkbox" id="captcha" class="recaptcha-checkbox" required>
                <label for="captcha" class="recaptcha-text">Я не робот</label>
                <div class="recaptcha-logo"></div>
            </div>
        </div>

        <div>
            <img class="showcase-image" src="usm-presentation2.jpg" alt="Blocul Central USM" onerror="this.src='https://picsum.photos/id/1018/410/240'">
        </div>

    </div>

</div>

</body>
</html>
